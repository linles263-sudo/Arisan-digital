<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARISAN DIGITAL - Premium</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');
  body { font-family: 'Poppins', sans-serif; }
 .tema-ungu { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
 .tema-ijo { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
 .tema-pink { background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%); }
 .tema-emas { background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); }
 .glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
 .shake { animation: shake 0.5s infinite; }
  @keyframes shake {
    0%,100% { transform: translateX(0) rotate(0deg); }
    25% { transform: translateX(-10px) rotate(-5deg); }
    75% { transform: translateX(10px) rotate(5deg); }
  }
 .confetti { position: fixed; width: 10px; height: 10px; background: #f00; animation: confetti-fall 3s linear; }
  @keyframes confetti-fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body id="body" class="tema-ungu min-h-screen p-4">
<div class="max-w-2xl mx-auto">
  
  <!-- HEADER PREMIUM -->
  <div class="glass rounded-3xl p-6 mb-4 text-white">
    <div class="flex justify-between items-center mb-4">
      <div class="flex items-center gap-3">
        <img id="logoRT" src="https://cdn-icons-png.flaticon.com/512/4320/4320371.png" class="w-12 h-12 rounded-full bg-white p-1">
        <div>
          <h1 id="namaGrup" class="text-2xl font-black">ARISAN DIGITAL PRO MAX</h1>
          <p class="text-xs opacity-80">Premium Edition - Anti Curang 100%</p>
        </div>
      </div>
      <button onclick="gantiTema()" class="glass px-3 py-2 rounded-xl text-xs font-bold">🎨 Tema</button>
    </div>
    
    <!-- STATS -->
    <div class="grid grid-cols-4 gap-2 text-center">
      <div class="glass rounded-xl p-2">
        <div id="totalAnggota" class="text-2xl font-black">0</div>
        <div class="text-xs">Anggota</div>
      </div>
      <div class="glass rounded-xl p-2">
        <div id="sudahDapat" class="text-2xl font-black">0</div>
        <div class="text-xs">Menang</div>
      </div>
      <div class="glass rounded-xl p-2">
        <div id="sisa" class="text-2xl font-black">0</div>
        <div class="text-xs">Sisa</div>
      </div>
      <div class="glass rounded-xl p-2">
        <div id="putaran" class="text-2xl font-black">0</div>
        <div class="text-xs">Putaran</div>
      </div>
    </div>
  </div>

  <!-- TOMBOL KOCOK -->
  <button id="btnKocok" onclick="kocokArisan()" class="w-full bg-white text-purple-600 font-black text-xl py-6 rounded-3xl shadow-2xl mb-4 active:scale-95 transition">
    🎲 KOCOK SEKARANG
  </button>

  <!-- HASIL MENANG -->
  <div id="hasilMenang" class="glass rounded-3xl p-8 mb-4 text-white text-center hidden">
    <div class="text-sm mb-2">🎉 SELAMAT KEPADA 🎉</div>
    <div id="namaPemenang" class="text-4xl font-black mb-2"></div>
    <div class="text-xs opacity-80">Putaran ke-<span id="putaranMenang"></span></div>
  </div>

  <!-- TAMBAH ANGGOTA -->
  <div class="glass rounded-3xl p-4 mb-4">
    <div class="flex gap-2 mb-3">
      <input id="inputNama" type="text" placeholder="Nama anggota..." class="flex-1 px-4 py-3 rounded-xl text-black" onkeypress="if(event.key==='Enter') tambahAnggota()">
      <button onclick="tambahAnggota()" class="bg-green-500 text-white px-6 py-3 rounded-xl font-bold">+ Tambah</button>
    </div>
    <div class="flex gap-2 text-xs">
      <button onclick="ubahNamaGrup()" class="glass text-white px-3 py-2 rounded-lg">✏️ Nama Grup</button>
      <button onclick="uploadLogo()" class="glass text-white px-3 py-2 rounded-lg">🖼️ Logo</button>
      <button onclick="exportExcel()" class="glass text-white px-3 py-2 rounded-lg">📊 Export</button>
    </div>
  </div>

  <!-- LIST ANGGOTA -->
  <div class="glass rounded-3xl p-4 mb-4 text-white">
    <h3 class="font-bold mb-3">📋 Belum Dapat Arisan</h3>
    <div id="listBelum" class="space-y-2 max-h-60 overflow-y-auto"></div>
  </div>

  <div class="glass rounded-3xl p-4 mb-4 text-white">
    <h3 class="font-bold mb-3">✅ Sudah Dapat Arisan</h3>
    <div id="listSudah" class="space-y-2 max-h-60 overflow-y-auto"></div>
  </div>

  <!-- RESET -->
  <button onclick="resetPutaran()" class="w-full bg-red-500 text-white font-bold py-4 rounded-3xl mb-4">
    🔄 RESET PUTARAN BARU
  </button>
  
  <div class="text-center text-white text-xs opacity-60">Made with ❤️ for Bu RT Senang</div>
</div>

<input type="file" id="inputLogo" accept="image/*" class="hidden" onchange="gantiLogo(event)">

<script>
let data = JSON.parse(localStorage.getItem('arisanProMax')) || {
  grup: 'ARISAN DIGITAL PRO MAX',
  logo: 'https://cdn-icons-png.flaticon.com/512/4320/4320371.png',
  tema: 'tema-ungu',
  anggota: [],
  pemenang: [],
  putaran: 0
};

const audioContext = new (window.AudioContext || window.webkitAudioContext)();

// SUARA KOCOK GELAS REAL
function suaraKocokGelas() {
  for(let i = 0; i < 15; i++) {
    setTimeout(() => {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = 200 + Math.random() * 400;
      gain.gain.setValueAtTime(0.3, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
      osc.start();
      osc.stop(audioContext.currentTime + 0.1);
    }, i * 200);
  }
}

// SUARA DRUM ROLL
function suaraDrumRoll() {
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.connect(gain);
  gain.connect(audioContext.destination);
  osc.frequency.value = 100;
  gain.gain.setValueAtTime(0.5, audioContext.currentTime);
  osc.start();
  setTimeout(() => {
    osc.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 2);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);
  }, 100);
  setTimeout(() => osc.stop(), 2000);
}

// SUARA JENG JENG WINNER
function suaraJengJeng() {
  [523, 659, 784, 1047].forEach((freq, i) => {
    setTimeout(() => {
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.5, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
      osc.start();
      osc.stop(audioContext.currentTime + 0.3);
    }, i * 150);
  });
}

function saveData() {
  localStorage.setItem('arisanProMax', JSON.stringify(data));
  render();
}

function tambahAnggota() {
  const nama = document.getElementById('inputNama').value.trim();
  if(!nama) return alert('Isi nama dulu Prof!');
  if(data.anggota.includes(nama)) return alert('Udah ada namanya!');
  data.anggota.push(nama);
  document.getElementById('inputNama').value = '';
  saveData();
}

function hapusAnggota(nama) {
  data.anggota = data.anggota.filter(a => a!== nama);
  saveData();
}

async function kocokArisan() {
  if(data.anggota.length === 0) return alert('Tambah anggota dulu Prof!');
  
  const btn = document.getElementById('btnKocok');
  btn.disabled = true;
  btn.innerHTML = '🎲 MENGOCOK...';
  btn.classList.add('shake');
  
  // SUARA KOCOK GELAS 3 DETIK
  suaraKocokGelas();
  suaraDrumRoll();
  
  await new Promise(r => setTimeout(r, 3000));
  
  // PILIH PEMENANG
  const randomIndex = Math.floor(Math.random() * data.anggota.length);
  const pemenang = data.anggota[randomIndex];
  
  // PINDAH KE PEMENANG
  data.anggota.splice(randomIndex, 1);
  data.pemenang.push({ nama: pemenang, putaran: data.putaran + 1 });
  data.putaran++;
  
  // SUARA JENG JENG
  suaraJengJeng();
  confetti();
  
  // TAMPILIN HASIL
  document.getElementById('hasilMenang').classList.remove('hidden');
  document.getElementById('namaPemenang').textContent = pemenang;
  document.getElementById('putaranMenang').textContent = data.putaran;
  
  btn.disabled = false;
  btn.innerHTML = '🎲 KOCOK SEKARANG';
  btn.classList.remove('shake');
  
  saveData();
  
  setTimeout(() => {
    document.getElementById('hasilMenang').classList.add('hidden');
  }, 5000);
}

function resetPutaran() {
  if(!confirm('Reset semua? Anggota yang udah menang bisa ikut lagi.')) return;
  data.anggota = [...data.anggota,...data.pemenang.map(p => p.nama)];
  data.pemenang = [];
  data.putaran = 0;
  saveData();
}

function gantiTema() {
  const tema = ['tema-ungu', 'tema-ijo', 'tema-pink', 'tema-emas'];
  const current = tema.indexOf(data.tema);
  data.tema = tema[(current + 1) % tema.length];
  document.getElementById('body').className = data.tema + ' min-h-screen p-4';
  saveData();
}

function ubahNamaGrup() {
  const nama = prompt('Nama grup arisan:', data.grup);
  if(nama) {
    data.grup = nama;
    saveData();
  }
}

function uploadLogo() {
  document.getElementById('inputLogo').click();
}

function gantiLogo(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(evt) {
    data.logo = evt.target.result;
    saveData();
  }
  reader.readAsDataURL(file);
}

function exportExcel() {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet([
   ...data.pemenang.map((p, i) => ({ No: i+1, Nama: p.nama, Status: 'Menang', Putaran: p.putaran })),
   ...data.anggota.map((a, i) => ({ No: data.pemenang.length + i + 1, Nama: a, Status: 'Belum', Putaran: '-' }))
  ]);
  XLSX.utils.book_append_sheet(wb, ws, 'Laporan Arisan');
  XLSX.writeFile(wb, `Laporan-${data.grup}-${Date.now()}.xlsx`);
}

function confetti() {
  for(let i = 0; i < 50; i++) {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'confetti';
      div.style.left = Math.random() * 100 + '%';
      div.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 3000);
    }, i * 30);
  }
}

function render() {
  document.getElementById('namaGrup').textContent = data.grup;
  document.getElementById('logoRT').src = data.logo;
  document.getElementById('body').className = data.tema + ' min-h-screen p-4';
  document.getElementById('totalAnggota').textContent = data.anggota.length + data.pemenang.length;
  document.getElementById('sudahDapat').textContent = data.pemenang.length;
  document.getElementById('sisa').textContent = data.anggota.length;
  document.getElementById('putaran').textContent = data.putaran;
  
  document.getElementById('listBelum').innerHTML = data.anggota.length? 
    data.anggota.map(a => `
      <div class="glass rounded-xl p-3 flex justify-between items-center">
        <span>${a}</span>
        <button onclick="hapusAnggota('${a}')" class="bg-red-500 px-3 py-1 rounded-lg text-xs">Hapus</button>
      </div>
    `).join('') : '<div class="text-center opacity-60 text-sm">Semua sudah dapat</div>';
    
  document.getElementById('listSudah').innerHTML = data.pemenang.length?
    data.pemenang.map(p => `
      <div class="glass rounded-xl p-3 flex justify-between items-center">
        <span>${p.nama}</span>
        <span class="bg-yellow-500 text-black px-3 py-1 rounded-lg text-xs font-bold">Putaran ${p.putaran}</span>
      </div>
    `).join('') : '<div class="text-center opacity-60 text-sm">Belum ada pemenang</div>';
}

render();
</script>
</body>
  </html>
